[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fuzz = { runs = 512 }
invariant = { runs = 64, depth = 128, fail_on_revert = false }

[profile.stress]
fuzz = { runs = 5000 }
invariant = { runs = 256, depth = 512, fail_on_revert = false }

[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"
